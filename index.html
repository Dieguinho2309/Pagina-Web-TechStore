<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pagina-dispositivos-tecnologicos</title>
  </head>
  <body>
      <nav class="navbar">
      <div class="logo" id="logo">TechStore</div>

      <ul class="nav-links">
        <li><a href="#">Productos</a></li>
        <li><a href="#">Categorías</a></li>
        <li><a href="#">Ofertas</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>

      <div class="nav-actions">
        <div class="search-container">
          <input type="text" placeholder="Buscar...">
        </div>
        <div class="cart-icon">🛒</div>
      </div>
    </nav>

    <section class="hero-section">
      <div class="hero-left">
        <span class="badge">¡Oferta Especial!</span>
        <h1>La mejor tecnologia a tu alcance</h1>
        <p>Descubre lo último en dispositivos tecnológicos con ofertas increibles. Envio gratis en compras superiores a $50  </p>
        <div class="hero-buttons">
          <button class="buttons">Ver Productos </button>
          <button class="buttons">Mas Informacion</button>
        </div>
      </div>
      <div class="hero-right">
        <div class="card">Laptop <i class="fa-solid fa-laptop"></i></div>
        <div class="card">Tablet <i class="fa-solid fa-tablet"></i></div>
        <div class="card">Audio <i class="fa-solid fa-headphones"></i></div>
        <div class="card">Smartwatch <i class="fa-solid fa-clock"></i></div>
      </div>
    </section>


    <script type="module" src="/src/main.js"></script>
  </body>
</html>
